apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: fastapi-deployment
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
  - host: example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: fastapi-deployment
            port:
              number: 80